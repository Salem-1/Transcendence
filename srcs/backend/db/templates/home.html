{% load static %}

<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Langing Page</title>
		<link rel="stylesheet" href="{% static 'myfirst.css' %}" />
		<link
			href="https://fonts.cdnfonts.com/css/poetsen-one"
			rel="stylesheet"
		/>
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="{% static 'favicon/apple-touch-icon.png' %}"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="{% static 'favicon/favicon-32x32.png' %}"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="16x16"
			href="{% static 'favicon/favicon-16x16.png' %}"
		/>
		<link rel="manifest" href="{% static 'favicon/site.webmanifest' %}" />
	</head>
	<body>
		<div id="initial_page" class="page">
			<div class="hero">
				<div class="btns">
					<img
						id="logo-main"
						src="{% static 'assets/logo1.png' %}"
						alt=""
					/>
					<a href="login.html">
						<div id="login">
							<div
								class="button-div-one"
								style="background: #f01e1e"
							></div>
							<div
								id="red"
								class="button-div-two"
								style="
									background: linear-gradient(
										180deg,
										#ff2c17 0%,
										#ff5353 100%
									);
								"
							></div>
							<div class="button-div-three">
								<h1 class="button-text">LOGIN</h1>
							</div>
						</div>
					</a>
					<a
						href="https://api.intra.42.fr/oauth/authorize?client_id=u-s4t2ud-0e3d38438ded877257e74e3dc1078913fe2a5e940f4d27c5dafd20eda8ec881b&redirect_uri=http%3A%2F%2Flocalhost%3A3000%2Fauth&response_type=code"
					>
						<div id="login42">
							<div
								class="button-div-one"
								style="background: #c7a940"
							></div>
							<div
								id="yellow"
								class="button-div-two"
								style="
									background: linear-gradient(
										180deg,
										#eda800 0%,
										#ffbb0b 100%
									);
								"
							></div>
							<div class="button-div-three">
								<h1 class="button-text">LOGIN 42</h1>
							</div>
						</div>
					</a>
					<a
						href="javascript:;"
						onclick="navigateTo('regitration-page')"
					>
						<div id="register">
							<div
								class="button-div-one"
								style="background: #82764d"
							></div>
							<div
								id="black"
								class="button-div-two"
								style="
									background: linear-gradient(
										180deg,
										#524040 0%,
										#070706 100%
									);
								"
							></div>
							<div class="button-div-three">
								<h1 class="button-text">REGISTER</h1>
							</div>
						</div>
					</a>
					<div class="quote">
						<h1 id="quote-text">
							Quote: When someone says “Expect the Unexpected”
							slap them and say : “You didn't expect that, did
							you?”
						</h1>
					</div>
				</div>
			</div>
		</div>

		<div id="regitration-page" class="page" style="display: none">
			<div class="hero">
				<img
					id="logo-regitration"
					src="{% static 'assets/logo1.png' %}"
					alt=""
				/>
				<form action="javascript:;" onsubmit="register()">
					<div id="register-div">
						<img
							id="Person"
							src="{% static 'assets/Person.png' %}"
							alt="Character"
						/>
						<input
							type="text"
							id="username"
							name="username"
							required
							placeholder="Username"
						/>
						<input
							type="password"
							id="password"
							name="password"
							required
							placeholder="Password"
						/>
						<input
							type="password"
							id="confirmpassword"
							name="confirmPassword"
							required
							placeholder="Confirm Password"
						/>
						<input type="submit" hidden />
						<div
							id="registration-button"
							onclick="register()"
							style="cursor: pointer"
						>
							<div
								class="button-div-one"
								style="background: #82764d"
							></div>
							<div
								id="black"
								class="button-div-two"
								style="
									background: linear-gradient(
										180deg,
										#524040 0%,
										#070706 100%
									);
								"
							></div>
							<div class="button-div-three">
								<h1 class="button-text">REGISTER</h1>
							</div>
						</div>
					</div>
				</form>
			</div>
		</div>
	</body>
	<script src="{% static '/js/index.js' %}"></script>
</html>
